<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Norfolk Insider — Front Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --text: #2c2418;
      --text-muted: #7a6f60;
      --accent: #3d6b4f;
      --accent-light: #e8f0eb;
      --border: #e8e2d8;
      --bot-bg: #f3efe8;
      --user-bg: #3d6b4f;
      --user-text: #ffffff;
      --shadow: 0 1px 3px rgba(44,36,24,0.06);
      --radius: 14px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 520px;
      margin: 0 auto;
      padding: 0;
    }

    /* Header */
    .header {
      padding: 28px 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header img {
      max-width: 180px;
      height: auto;
      margin-bottom: 14px;
    }
    .header p {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.5;
      animation: fadeIn 0.25s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      padding: 12px 20px;
      background: var(--bot-bg);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0.5;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      padding: 12px 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
      background: var(--bg);
      outline: none;
      min-height: 46px;
      max-height: 120px;
      transition: border-color 0.15s;
    }
    .input-area textarea:focus {
      border-color: var(--accent);
    }
    .input-area textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .send-btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://norfolkinsider.ca/norfolkinsider.webp" alt="The Norfolk Insider">
    <p>Welcome to the Norfolk Insider front desk. If you have something you want to be shared in the Norfolk Insider Newsletter, tell us about it here. Events, live music, birthdays, a bit of news....whatever you think Norfolk should know about!</p>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <textarea
      id="userInput"
      placeholder="Share something with the community..."
      rows="1"
      autofocus
    ></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    const chatArea = document.getElementById("chatArea");
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    // Conversation history for the API
    let conversationHistory = [];
    let isLoading = false;

    // Initial greeting
    window.addEventListener("DOMContentLoaded", () => {
      addMessage("bot", "Hey there! Got something happening in Norfolk County? An event, a birthday, a bit of news — whatever it is, I'd love to hear about it.");
    });

    // Auto-resize textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
      sendBtn.disabled = !input.value.trim() || isLoading;
    });

    // Enter to send (shift+enter for newline)
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typingIndicator";
      div.innerHTML = "<span></span><span></span><span></span>";
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isLoading) return;

      addMessage("user", text);
      input.value = "";
      input.style.height = "auto";
      sendBtn.disabled = true;
      isLoading = true;
      showTyping();

      conversationHistory.push({ role: "user", content: text });

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        const data = await res.json();
        hideTyping();

        if (data.error) {
          addMessage("bot", "Sorry, something went wrong. Please try again in a moment.");
        } else {
          addMessage("bot", data.reply);
          conversationHistory.push({ role: "assistant", content: data.reply });
        }
      } catch (err) {
        hideTyping();
        addMessage("bot", "Hmm, I can't connect right now. Please try again in a moment.");
      }

      isLoading = false;
      sendBtn.disabled = !input.value.trim();
      input.focus();
    }
  </script>
</body>
</html>
